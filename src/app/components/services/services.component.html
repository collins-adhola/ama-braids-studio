<section class="services">
  <div class="container">
    <div class="section-header" appScrollReveal>
      <span class="section-label">Featured Styles</span>
      <div class="gold-divider"></div>
      <h2>Beautiful <em>Styles</em></h2>
      <p class="section-sub">
        A curated selection of my most requested and beloved braiding styles.
      </p>
    </div>

    <div class="services-grid">
      @for (service of services; track service.name; let i = $index) {
        <div class="service-card" appScrollReveal>
          <span class="service-num">0{{ i + 1 }}</span>
          <h3>{{ service.name }}</h3>
          <p>{{ service.description }}</p>
          <span class="service-price">{{ service.price }}</span>
          <div class="card-line"></div>
        </div>
      }
    </div>

    <div class="gallery-link-wrapper" appScrollReveal>
      <a href="https://instagram.com/braidsbyama" target="_blank" class="btn-ghost">
        View Full Gallery →
      </a>
    </div>
  </div>


</section>
